<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buy a Wii</title>
    <style>
main {
    position: relative;
    height: 300px; /* or whatever size you want */
}

#win {
    position: absolute;
    left: 3.3em;
    top: 0em;
    transition-duration: 0.3s; /* Animate the movement */
}

#question {
    position: middle;

}
    </style>
</head>
<body>
    <p id="question">
        Are you sure?
    </p>
    <main>
        <button id="win">No</button>
        <a href="https://www.facebook.com/marketplace/item/1282854126628711/?mibextid=wwXIfr&rdid=L3UJqTJlaJrBpDRh&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1B1785SDYe%2F%3Fmibextid%3DwwXIfr#">
        <button id="next">Yes</button>
        </a>

    </main>
    <script>

// Move the button whenever someone tries to click on it.
function onMouseOver(e) {
    const button = e.target;

    // Get the size of the container (<main>)
    const container = button.parentElement;
    const maxX = container.clientWidth - button.offsetWidth;
    const maxY = container.clientHeight - button.offsetHeight;

    // Generate random positions
    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    // Apply new position
    button.style.left = randomX + "px";
    button.style.top = randomY + "px";
}


document.getElementById("win").onmouseover = onMouseOver;
    </script>
</body>
</html>
